# Copy this to secrets/homelab.yaml and encrypt it with sops.
# Values below are examples only.

cloudflare-dns.env: |
  CLOUDFLARE_DNS_API_TOKEN=replace-me

cloudflare-admin.env: |
  CLOUDFLARE_API_TOKEN=replace-me
  CLOUDFLARE_ACCOUNT_ID=replace-me
  CLOUDFLARE_ZONE_ID=replace-me
  CLOUDFLARE_ZONE=therealrishabh.com

cloudflared-tunnel.json: |
  {
    "AccountTag": "replace-me",
    "TunnelSecret": "replace-me",
    "TunnelID": "replace-me"
  }

tailscale-oauth.env: |
  TAILSCALE_OAUTH_CLIENT_ID=replace-me
  TAILSCALE_OAUTH_CLIENT_SECRET=replace-me
  TAILSCALE_OAUTH_READ_SCOPES='dns:read'
  TAILSCALE_OAUTH_WRITE_SCOPES='dns:write'
  TAILSCALE_TAILNET=-

vaultwarden.env: |
  ADMIN_TOKEN=replace-with-argon2-token

samba-password: replace-with-long-random-password

restic-password: replace-with-long-random-password

restic-ssh-key: |
  -----BEGIN OPENSSH PRIVATE KEY-----
  replace-with-restic-storage-box-private-key
  -----END OPENSSH PRIVATE KEY-----

restic-known-hosts: |
  [u123456.your-storagebox.de]:23 ssh-ed25519 replace-with-ssh-keyscan-output

restic.env: |
  # Optional restic environment values.
  # For SFTP repositories, prefer SSH keys and known_hosts over passwords.
